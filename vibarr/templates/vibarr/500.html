<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibarr | Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            color: #f1f5f9;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full glass rounded-2xl p-8 text-center shadow-2xl relative overflow-hidden">
        <!-- Background Glow -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-[#e94560] rounded-full blur-3xl opacity-20 pointer-events-none"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-[#00a1ff] rounded-full blur-3xl opacity-10 pointer-events-none"></div>

        <!-- Warning Icon -->
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-rose-500/10 text-rose-500 mb-6 border border-rose-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
        </div>

        <h1 class="text-3xl font-bold mb-3 tracking-tight text-white">Something Went Wrong</h1>
        <p class="text-slate-400 mb-6 leading-relaxed">
            Vibarr encountered an unexpected error while trying to process your request. Our system logs have captured this incident.
        </p>

        <!-- Correlation ID Box -->
        {% if correlation_id %}
        <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-4 mb-6 text-left">
            <div class="text-xs text-slate-500 uppercase font-semibold tracking-wider mb-1">Correlation ID</div>
            <div class="font-mono text-sm text-slate-300 break-all select-all flex items-center justify-between">
                <span>{{ correlation_id }}</span>
                <button onclick="navigator.clipboard.writeText('{{ correlation_id }}'); this.innerHTML='Copied!';" class="text-xs text-[#e94560] hover:underline cursor-pointer focus:outline-none">
                    Copy
                </button>
            </div>
        </div>
        {% endif %}

        <!-- Navigation Buttons -->
        <div class="space-y-3">
            <a href="/" class="block w-full py-3 px-4 rounded-xl bg-gradient-to-r from-[#e94560] to-[#f43f5e] hover:from-[#d83f58] hover:to-[#e11d48] text-white font-semibold shadow-lg shadow-rose-500/25 transition-all focus:ring-2 focus:ring-[#e94560]/50 outline-none text-center">
                Return to Dashboard
            </a>
            <button onclick="window.history.back();" class="block w-full py-3 px-4 rounded-xl border border-slate-700 hover:bg-slate-800/40 text-slate-300 transition-all focus:ring-2 focus:ring-slate-600/50 outline-none">
                Go Back
            </button>
        </div>
    </div>
</body>
</html>
