<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connecting to Plex...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="p-8 glass bg-white/5 border border-white/10 rounded-2xl text-center space-y-6">
        <h1 class="text-2xl font-bold">Waiting for Plex...</h1>
        <p class="text-gray-400">Please authorize the app in the Plex window that opened.</p>
        <div class="animate-spin h-8 w-8 border-4 border-rose-500 border-t-transparent rounded-full mx-auto"></div>
        <a href="{% url 'finish_plex_auth' %}" class="block bg-rose-500 px-6 py-2 rounded-lg font-bold hover:bg-rose-600 transition">
            I've Authorized
        </a>
    </div>
</body>
</html>
