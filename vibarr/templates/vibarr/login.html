{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibarr | Login</title>
    <link rel="icon" type="image/png" href="{% static 'vibarr/img/logo_v.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bg-login {
            background-image: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.8)), url("{% static 'vibarr/img/login_bg.png' %}");
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-login min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-md w-full p-10 rounded-[3rem] space-y-8 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-rose-500/10 blur-[80px] rounded-full"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-rose-500/10 blur-[80px] rounded-full"></div>

        <div class="text-center space-y-2">
            <div class="flex flex-col items-center justify-center -space-y-4">
                <div class="relative w-48 h-48 flex items-center justify-center">
                    <img src="{% static 'vibarr/img/logo_v.png' %}" alt="Vibarr" class="w-full h-full mix-blend-screen">
                </div>
                <h1 class="text-5xl font-extrabold text-white tracking-tighter relative z-10">IBARR</h1>
            </div>
            <p class="text-rose-500 font-bold text-xs uppercase tracking-[0.3em]">Curation Intelligence</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label for="password" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-4">Access Code</label>
                <input type="password" name="password" id="password" required 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-rose-500/50 transition-all text-center tracking-widest font-mono"
                       placeholder="••••••••">
            </div>

            {% if error %}
            <p class="text-rose-500 text-[10px] font-bold text-center uppercase tracking-widest bg-rose-500/10 p-3 rounded-xl border border-rose-500/20">
                {{ error }}
            </p>
            {% endif %}

            <button type="submit" 
                    class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-rose-500 hover:text-white transition-all duration-500 transform active:scale-95 shadow-2xl shadow-rose-500/20">
                Enter
            </button>
        </form>

        <div class="text-center">
            <p class="text-[9px] text-gray-600 uppercase tracking-widest">Protected Environment</p>
        </div>
    </div>
</body>
</html>
