<div id="plex-discovery-results" class="space-y-3 animate-fade-in">
    {% if servers %}
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2">
            <svg class="w-3 h-3 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            Discovered Servers ({{ servers|length }})
        </div>
        <div class="grid grid-cols-1 gap-2">
            {% for server in servers %}
            <button type="button" 
                    onclick="document.getElementById('plex_url_input').value = '{{ server.url }}'; document.getElementById('plex-discovery-results').innerHTML = '';"
                    class="flex items-center justify-between p-3 bg-white/5 hover:bg-rose-500/10 border border-white/10 hover:border-rose-500/30 rounded-xl transition group text-left w-full">
                <div>
                    <div class="text-sm font-bold text-white group-hover:text-rose-500 transition">{{ server.name }}</div>
                    <div class="text-[10px] text-gray-500 truncate max-w-[200px]">{{ server.url }}</div>
                </div>
                <div class="flex items-center gap-2">
                    {% if server.owned %}
                    <span class="text-[8px] bg-rose-500/20 text-rose-500 px-1.5 py-0.5 rounded border border-rose-500/20 uppercase font-black">Owner</span>
                    {% endif %}
                    <svg class="w-4 h-4 text-gray-600 group-hover:text-rose-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </button>
            {% endfor %}
        </div>
    {% else %}
        <div class="p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl text-center">
            <p class="text-xs text-rose-500 font-medium">No servers found on this account.</p>
        </div>
    {% endif %}
</div>
