<button hx-post="{% url 'toggle_pin' show.id %}" 
        hx-target="this" 
        hx-swap="outerHTML"
        class="{% if show.is_pinned %}text-rose-500{% else %}text-gray-400{% endif %} hover:text-rose-400 transition-colors duration-200"
        title="{% if show.is_pinned %}Unpin from Top{% else %}Pin to Top{% endif %}">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="{% if show.is_pinned %}currentColor{% else %}none{% endif %}" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
    </svg>
</button>
