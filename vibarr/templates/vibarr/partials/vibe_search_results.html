<div class="mt-8 space-y-6">
    <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-white">Vibe Results: <span class="text-rose-500">"{{ query }}"</span></h2>
        <button onclick="document.getElementById('vibe-results').innerHTML=''" class="text-xs text-gray-500 hover:text-white">Clear Results</button>
    </div>
    
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
        {% for item in results %}
        <div class="glass p-3 rounded-xl border border-white/5 group relative">
            <div class="relative">
                <img src="https://image.tmdb.org/t/p/w185{{ item.poster_path }}" alt="{{ item.title }}" class="rounded-lg w-full aspect-[2/3] object-cover">
                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity rounded-lg flex flex-col justify-center items-center">
                    <!-- We'll need a way to add this to the DB -->
                    <button hx-post="{% url 'taste_from_search' %}" 
                            hx-vals='{"tmdb_id": "{{ item.tmdb_id }}", "media_type": "{{ item.media_type }}", "title": "{{ item.title }}"}'
                            hx-target="closest .group" 
                            hx-swap="outerHTML" 
                            class="bg-rose-500 text-white px-4 py-1.5 rounded-full text-xs font-bold">Taste</button>
                </div>
            </div>
            <h4 class="text-white text-xs font-bold mt-2 truncate">{{ item.title }}</h4>
            <p class="text-[10px] text-gray-500 uppercase">{{ item.media_type }}</p>
            {% if item.reasoning %}
            <p class="text-[9px] text-rose-400/80 mt-1 leading-tight line-clamp-2">"{{ item.reasoning }}"</p>
            {% endif %}
        </div>
        {% empty %}
        <div class="col-span-full py-12 text-center glass rounded-2xl">
            <p class="text-gray-500 italic">No matches found for this specific vibe. Try a different description!</p>
        </div>
        {% endfor %}
    </div>
</div>
