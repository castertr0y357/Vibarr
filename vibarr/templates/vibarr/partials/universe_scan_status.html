{% if running %}
<div id="universe-scan-status-container" 
     hx-get="{% url 'universe_scan_status' %}" 
     hx-trigger="every 2s" 
     hx-swap="outerHTML" 
     class="p-4 glass border border-rose-500/20 rounded-2xl relative overflow-hidden animate-fade-in mb-6">
    <div class="absolute inset-0 bg-gradient-to-r from-rose-500/5 via-transparent to-transparent animate-pulse"></div>
    
    <div class="relative flex justify-between items-center mb-2">
        <div class="flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-rose-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span class="text-[10px] font-black text-rose-400 uppercase tracking-widest">{{ status|default:"Analyzing Universe Ecosystem..." }}</span>
        </div>
        <span class="text-xs font-black text-rose-500">{{ progress|default:0 }}%</span>
    </div>
    
    <!-- Progress Bar -->
    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden relative">
        <div class="bg-rose-500 h-full transition-all duration-500 rounded-full shadow-[0_0_10px_rgba(244,63,94,0.5)]" 
             style="width: {{ progress|default:0 }}%;"></div>
    </div>
</div>
{% else %}
<div id="universe-scan-status-container" class="hidden"></div>
{% endif %}
