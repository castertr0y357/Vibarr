{% for show in committed %}
<div class="relative group">
    <img src="https://image.tmdb.org/t/p/w185{{ show.poster_path }}" alt="{{ show.title }}" class="rounded-lg opacity-40 group-hover:opacity-100 transition duration-500 grayscale group-hover:grayscale-0">
    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
        <span class="text-[10px] bg-black/60 text-white px-2 py-1 rounded font-bold uppercase tracking-widest border border-white/20">Committed</span>
    </div>
    {% if show.is_downloading %}
    <div class="absolute top-1 left-1 z-10">
        <span class="flex h-1.5 w-1.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></span>
        </span>
    </div>
    {% endif %}
</div>
{% endfor %}
