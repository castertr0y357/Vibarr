{% extends 'vibarr/base.html' %}

{% block title %}Vibarr | Setup Wizard{% endblock %}

{% block extra_css %}
<style>
    /* Override sidebar for setup to keep focus on the wizard */
    aside { display: none !important; }
    main { margin-left: 0 !important; }
    
    .setup-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .step-indicator {
        @apply w-3 h-3 rounded-full bg-white/10 transition-all duration-500;
    }
    .step-indicator.active {
        @apply bg-rose-500 w-8 shadow-[0_0_12px_rgba(233,69,96,0.5)];
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center py-12 px-4">
    <div class="mb-12 text-center">
        <h1 class="text-5xl font-black text-white tracking-tighter mb-4">
            VIB<span class="text-rose-500">ARR</span>
        </h1>
        <div class="flex gap-3 justify-center items-center">
            <div class="step-indicator {% if step == 'welcome' %}active{% endif %}"></div>
            <div class="step-indicator {% if step == 'media' %}active{% endif %}"></div>
            <div class="step-indicator {% if step == 'automation' %}active{% endif %}"></div>
            <div class="step-indicator {% if step == 'intelligence' %}active{% endif %}"></div>
            <div class="step-indicator {% if step == 'finish' %}active{% endif %}"></div>
        </div>
    </div>

    <div id="setup-content" class="setup-card w-full max-w-2xl rounded-[3rem] p-12 animate-fade-in">
        {% include 'vibarr/setup/steps/'|add:step|add:'.html' %}
    </div>
    
    <p class="text-gray-600 text-xs mt-12 font-medium uppercase tracking-[0.2em]">
        Cinematic Automation Suite &bull; Beta v1.0
    </p>
</div>
{% endblock %}
