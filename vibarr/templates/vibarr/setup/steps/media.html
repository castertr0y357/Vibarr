<form hx-post="{% url 'setup_action' %}" hx-target="#setup-content" class="space-y-8">
    {% csrf_token %}
    <input type="hidden" name="action" value="save_media">
    
    <div class="space-y-2">
        <h2 class="text-2xl font-bold text-white">Media Source</h2>
        <p class="text-sm text-gray-500">Pick your media servers. You can select both.</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <label class="relative flex items-center justify-center p-6 glass rounded-2xl cursor-pointer hover:bg-white/5 transition border border-white/5">
            <input type="checkbox" name="server_type" value="PLEX" class="hidden peer" 
                   {% if config.media_server_type == 'PLEX' or config.media_server_type == 'BOTH' %}checked{% endif %}
                   onchange="document.getElementById('plex-config').classList.toggle('hidden', !this.checked)">
            <div class="peer-checked:text-rose-500 font-bold transition">Plex</div>
            <div class="absolute inset-0 border-2 border-rose-500/50 rounded-2xl opacity-0 peer-checked:opacity-100 transition"></div>
        </label>
        <label class="relative flex items-center justify-center p-6 glass rounded-2xl cursor-pointer hover:bg-white/5 transition border border-white/5">
            <input type="checkbox" name="server_type" value="JELLYFIN" class="hidden peer"
                   {% if config.media_server_type == 'JELLYFIN' or config.media_server_type == 'BOTH' %}checked{% endif %}
                   onchange="document.getElementById('jellyfin-config').classList.toggle('hidden', !this.checked)">
            <div class="peer-checked:text-rose-500 font-bold transition">Jellyfin</div>
            <div class="absolute inset-0 border-2 border-rose-500/50 rounded-2xl opacity-0 peer-checked:opacity-100 transition"></div>
        </label>
    </div>

    <div class="space-y-8">
        <!-- Plex Config -->
        <div id="plex-config" class="space-y-4 {% if config.media_server_type != 'PLEX' and config.media_server_type != 'BOTH' %}hidden{% endif %} transition-all duration-500">
            <div class="flex items-center gap-2 mb-4">
                <span class="w-2 h-2 bg-rose-500 rounded-full"></span>
                <h4 class="text-white font-bold uppercase text-xs tracking-widest">Plex Authentication</h4>
            </div>
            
            <p class="text-xs text-gray-500 mb-4">Link your Plex account below, or manually enter your server address and token later in the dashboard settings.</p>

            <div class="space-y-3 mb-4">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Plex URL (Optional)</label>
                <input type="text" name="plex_url" value="{{ config.plex_url|default:'' }}" placeholder="http://localhost:32400" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-rose-500 transition">
            </div>

            <div id="plex-auth-container" class="pt-2">
                <button type="button" 
                        hx-get="{% url 'plex_pin_request' %}" 
                        hx-target="#plex-auth-container" 
                        class="w-full py-4 bg-rose-500/10 hover:bg-rose-500/20 text-rose-500 text-sm font-bold rounded-2xl border border-rose-500/20 transition shadow-lg shadow-rose-500/5">
                    Authenticate with Plex.tv
                </button>
            </div>
        </div>

        <!-- Jellyfin Config -->
        <div id="jellyfin-config" class="space-y-4 {% if config.media_server_type != 'JELLYFIN' and config.media_server_type != 'BOTH' %}hidden{% endif %} transition-all duration-500">
            <div class="flex items-center gap-2 mb-4">
                <span class="w-2 h-2 bg-rose-500 rounded-full"></span>
                <h4 class="text-white font-bold uppercase text-xs tracking-widest">Jellyfin Settings</h4>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Jellyfin URL</label>
                    <input type="text" name="jellyfin_url" value="{{ config.jellyfin_url|default:'' }}" placeholder="http://localhost:8096" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-rose-500 transition">
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Jellyfin API Key</label>
                    <input type="password" name="jellyfin_key" value="{{ config.jellyfin_api_key|default:'' }}" placeholder="Your API Key" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-rose-500 transition">
                </div>
            </div>
        </div>
    </div>

    <div class="pt-8 flex flex-col gap-4">
        <div class="flex gap-4">
            <button type="button" hx-get="{% url 'setup_wizard' %}?step=welcome" hx-target="#setup-content" class="flex-1 py-4 bg-white/5 text-gray-400 font-bold rounded-2xl hover:text-white transition">Back</button>
            <button type="submit" class="flex-2 px-12 py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-2xl transition shadow-xl shadow-rose-500/20">Next Step</button>
        </div>
        
        <a href="{% url 'dashboard' %}" class="text-center py-2 text-gray-600 hover:text-gray-400 text-xs font-bold uppercase tracking-widest transition">
            Skip Wizard & Go to Dashboard
        </a>
    </div>
</form>
