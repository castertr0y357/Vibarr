<form hx-post="{% url 'setup_action' %}" hx-target="#setup-content" class="space-y-8">
    {% csrf_token %}
    <input type="hidden" name="action" value="save_automation">
    
    <div class="space-y-2">
        <h2 class="text-2xl font-bold text-white">Automation Engine</h2>
        <p class="text-sm text-gray-500">Vibarr needs to know where to download your "tastings".</p>
    </div>

    <div class="space-y-6">
        <div class="space-y-3">
            <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Sonarr TV Root Folder</label>
            <select name="sonarr_root" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-rose-500 transition">
                {% for folder in sonarr_folders %}
                <option value="{{ folder.path }}">{{ folder.path }}</option>
                {% empty %}
                <option disabled>Could not reach Sonarr. Check .env settings.</option>
                {% endfor %}
            </select>
        </div>

        <div class="space-y-3">
            <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Radarr Movie Root Folder</label>
            <select name="radarr_root" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-rose-500 transition">
                {% for folder in radarr_folders %}
                <option value="{{ folder.path }}">{{ folder.path }}</option>
                {% empty %}
                <option disabled>Could not reach Radarr. Check .env settings.</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="pt-8 flex gap-4">
        <button type="button" hx-get="{% url 'setup_wizard' %}?step=media" hx-target="#setup-content" class="flex-1 py-4 bg-white/5 text-gray-400 font-bold rounded-2xl hover:text-white transition">Back</button>
        <button type="submit" class="flex-2 px-12 py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-2xl transition shadow-xl shadow-rose-500/20">Next Step</button>
    </div>
</form>
